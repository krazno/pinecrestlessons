<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank you · Brett Hannan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #003b0f;
      color: #f4f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .page {
      text-align: center;
      max-width: 420px;
    }
    .logo-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .thanks {
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo-mark">
      <img src="/logo.png" alt="Pinecrest School" width="56" height="56">
    </div>
    <p class="thanks">Thank you for having me - Brett</p>
  </main>
</body>
</html>
